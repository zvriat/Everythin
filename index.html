<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <title>Login System</title>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <button onclick="loadPage('pages/notes.html')">
        📝 Notes
    </button>

    <button onclick="loadPage('pages/settings.html')">
        ⚙ Settings
    </button>

    <div id="loginPanel">
        <div id="loginSection">
            <button id="loginBtn">
                Log in with Google
            </button>
        </div>

        <!-- PROFILE -->
        <div id="profileSection">

            <img id="avatar" width="30" >

            <h2 id="name"></h2>

            <p id="email"></p>

            <button id="logoutBtn">
                Logout
            </button>

        </div>
    </div>

</div>


<div class="mainContent">
    <div id="contentArea"></div>
</div>

<script src="script.js"></script>

</body>
</html>
